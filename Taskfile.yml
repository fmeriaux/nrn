version: "3"

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list
    silent: true

  checks:
    desc: Run all checks (lint + build + test) — use before committing
    cmds:
      - task: lint
      - task: build
      - task: test

  build:
    desc: Compile the release binary (target/release/nrn)
    cmds:
      - cargo build --release --all-features

  dev:
    desc: Compile a debug build
    cmds:
      - cargo build

  test:
    desc: Run all tests across the workspace
    cmds:
      - cargo test --workspace
      - cargo test --workspace --all-features

  fmt:
    desc: Format all source files
    cmds:
      - cargo fmt

  lint:
    desc: Check formatting and run Clippy on the workspace
    cmds:
      - cargo fmt --check
      - cargo clippy --workspace --all-targets -- -D warnings
      - cargo clippy --workspace --all-targets --all-features -- -D warnings

  audit:
    desc: Scan dependencies for security advisories (requires cargo-audit)
    cmds:
      - cargo audit

  coverage:
    desc: Measure test coverage across the workspace (requires cargo-llvm-cov)
    cmds:
      - cargo llvm-cov --workspace --all-features --summary-only

  coverage-html:
    desc: Generate an HTML coverage report for the workspace and open it
    cmds:
      - cargo llvm-cov --workspace --all-features --html --open

  install:
    desc: Install the nrn binary to ~/.cargo/bin (uses locked deps)
    cmds:
      - cargo install --path cli --locked

  clean:
    desc: Remove build artifacts
    cmds:
      - cargo clean
