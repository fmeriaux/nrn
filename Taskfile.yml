version: "3"

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list
    silent: true

  checks:
    desc: Run all checks (lint + build + test) — use before committing
    cmds:
      - task: lint
      - task: build
      - task: test

  build:
    desc: Compile the release binary (target/release/nrn)
    cmds:
      - cargo build --release

  dev:
    desc: Compile a debug build
    cmds:
      - cargo build

  test:
    desc: Run all tests across the workspace
    cmds:
      - cargo test --workspace

  fmt:
    desc: Format all source files
    cmds:
      - cargo fmt

  lint:
    desc: Check formatting and run Clippy on the workspace
    cmds:
      - cargo fmt --check
      - cargo clippy --workspace --all-targets -- -D warnings

  bench:
    desc: Run the performance benchmarks (criterion) for the core crate
    cmds:
      - cargo bench -p nrn --bench training

  audit:
    desc: Scan dependencies for security advisories (requires cargo-audit)
    cmds:
      - cargo audit

  coverage:
    desc: Measure test coverage across the workspace (requires cargo-llvm-cov)
    cmds:
      - cargo llvm-cov --workspace --summary-only

  coverage-check:
    desc: Fail if line coverage drops below the threshold (requires cargo-llvm-cov)
    cmds:
      - cargo llvm-cov --workspace --summary-only --fail-under-lines 99

  coverage-html:
    desc: Generate an HTML coverage report for the workspace and open it
    cmds:
      - cargo llvm-cov --workspace --html --open

  install:
    desc: Install the nrn binary to ~/.cargo/bin (uses locked deps; BLAS on macOS)
    cmds:
      - cargo install --path cli --locked {{if eq OS "darwin"}}--features blas{{end}}

  clean:
    desc: Remove build artifacts
    cmds:
      - cargo clean
